name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-artifacts:
    name: Build ${{ matrix.os }} binary
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # actions/checkout@v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # ocaml/setup-ocaml@v3
      - uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014
        with:
          ocaml-compiler: "5.2"

      - name: Install dependencies
        run: |
          opam pin add --yes --quiet --no-action --kind=path croncheck .
          opam install --yes --quiet --deps-only --with-test croncheck

      - name: Build and test
        run: |
          opam exec -- make build
          opam exec -- make test
          opam exec -- make integration-test

      - name: Set artifact name
        id: artifact
        run: |
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m)"

          case "$os" in
            linux) os_name="linux" ;;
            darwin) os_name="macos" ;;
            *) echo "unsupported os: $os" >&2; exit 1 ;;
          esac

          case "$arch" in
            x86_64|amd64) arch_name="x86_64" ;;
            arm64|aarch64) arch_name="arm64" ;;
            *) echo "unsupported arch: $arch" >&2; exit 1 ;;
          esac

          name="croncheck-${os_name}-${arch_name}"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Package binary
        run: |
          artifact="${{ steps.artifact.outputs.name }}"
          mkdir -p dist
          cp _build/default/bin/main.exe "dist/$artifact"
          chmod +x "dist/$artifact"
          tar -C dist -czf "$artifact.tar.gz" "$artifact"
          shasum -a 256 "$artifact.tar.gz" > "$artifact.tar.gz.sha256"

      - name: Upload artifact
        # actions/upload-artifact@v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            ${{ steps.artifact.outputs.name }}.tar.gz
            ${{ steps.artifact.outputs.name }}.tar.gz.sha256

      - name: Download artifact for smoke test
        # actions/download-artifact@v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: downloaded

      - name: Smoke test release artifact
        run: |
          artifact="${{ steps.artifact.outputs.name }}"
          cd downloaded
          shasum -a 256 -c "$artifact.tar.gz.sha256"
          cd ..
          mkdir -p smoke
          tar -C smoke -xzf "downloaded/$artifact.tar.gz"
          "smoke/$artifact" --help | grep -F "Static analysis"

  publish:
    name: Publish GitHub release
    needs: build-artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        # actions/download-artifact@v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: croncheck-*
          path: dist
          merge-multiple: true

      - name: Verify checksums
        run: |
          cd dist
          for checksum in *.sha256; do
            shasum -a 256 -c "$checksum"
          done

      - name: Create GitHub release
        # softprops/action-gh-release@v3
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true

  publish-docker:
    name: Publish Docker image
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # actions/checkout@v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # docker/setup-qemu-action@v3
      - uses: docker/setup-qemu-action@68827325e0b33c7199eb31dd4e31fbe9023e06e3

      # docker/setup-buildx-action@v3
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - name: Login to DHI registry
        # docker/login-action@v3
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Docker Hub
        # docker/login-action@v3
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        # docker/metadata-action@v5
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f
        with:
          images: pwbsladek/croncheck
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        # docker/build-push-action@v6
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DHI_RUNTIME_IMAGE=dhi.io/debian-base:bookworm
          provenance: true
          sbom: true
