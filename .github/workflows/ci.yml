name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    name: Build and test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ocaml-compiler: ["4.14", "5.2"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install dependencies
        run: |
          opam pin add --yes --no-action --kind=path croncheck .
          opam install --yes --deps-only --with-test croncheck

      - name: Build
        run: opam exec -- make build

      - name: Test
        run: opam exec -- make test

      - name: Integration test
        run: opam exec -- make integration-test

  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"

      - name: Install formatter
        run: opam install --yes dune ocamlformat.0.26.2

      - name: Check formatting
        run: opam exec -- make fmt-check
