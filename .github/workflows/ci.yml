name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    name: Build and test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ocaml-compiler: ["4.14", "5.2"]
    runs-on: ${{ matrix.os }}

    steps:
      # actions/checkout@v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # ocaml/setup-ocaml@v3
      - uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install dependencies
        run: |
          opam pin add --yes --quiet --no-action --kind=path croncheck .
          opam install --yes --quiet --deps-only --with-test croncheck

      - name: Build
        run: opam exec -- make build

      - name: Test
        run: opam exec -- make test

      - name: Integration test
        run: opam exec -- make integration-test

  opam-lint:
    name: Opam lint
    runs-on: ubuntu-latest

    steps:
      # actions/checkout@v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # ocaml/setup-ocaml@v3
      - uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014
        with:
          ocaml-compiler: "5.2"

      - name: Lint opam package
        run: opam exec -- make opam-lint

  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      # actions/checkout@v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # ocaml/setup-ocaml@v3
      - uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014
        with:
          ocaml-compiler: "5.2"

      - name: Install formatter
        run: opam install --yes --quiet dune ocamlformat.0.26.2

      - name: Check formatting
        run: opam exec -- make fmt-check
